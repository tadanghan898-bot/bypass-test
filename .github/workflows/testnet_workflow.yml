name: Testnet Faucet & Bridge

on:
  workflow_dispatch:
    inputs:
      wallet_address:
        description: 'Wallet address'
        required: true
        type: string
      action:
        description: 'Action'
        required: true
        type: choice
        options:
          - status
          - claim
          - test
          - full
      alchemy_key:
        description: 'Alchemy API Key (optional)'
        required: false
        type: string
        default: ''

jobs:
  testnet:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Clone AIBLOCKCHAN repo
        uses: actions/checkout@v4
        with:
          repository: hanmaku/AIBLOCKCHAN
          path: AIBLOCKCHAN
          sparse-checkout: |
            testnet_faucet_engine.py
            blockchain_workflows/
          sparse-checkout-cone-mode: false

      - name: Check testnet script
        run: |
          ls -la AIBLOCKCHAN/testnet_faucet_engine.py 2>/dev/null || echo "FILE NOT FOUND"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install web3 eth-account eth-abi requests httpx

      - name: Test connectivity
        if: inputs.action == 'test'
        run: |
          python3 << 'PYEOF'
          from web3 import Web3

          RPCS = {
              'Sepolia': 'https://rpc.sepolia.org',
              'Base Sepolia': 'https://sepolia.base.org',
              'Linea Sepolia': 'https://rpc.sepolia.linea.build',
              'Scroll Sepolia': 'https://rpc.ankr.com/scroll_sepolia',
              'Arbitrum Sepolia': 'https://sepolia-rollup.arbitrum.io/rpc',
              'Optimism Sepolia': 'https://sepolia.optimism.io',
              'Mode Sepolia': 'https://sepolia.mode.network',
          }

          wallet = '''${{ inputs.wallet_address }}'''.strip()
          print(f"[*] Testing connectivity for: {wallet}")
          print()

          total = 0.0
          for name, rpc in RPCS.items():
              try:
                  w = Web3(Web3.HTTPProvider(rpc, request_kwargs={'timeout': 10}))
                  if w.is_connected():
                      bal = w.eth.get_balance(wallet) / 1e18
                      block = w.eth.block_number
                      status = "OK" if bal > 0.0001 else "0 balance"
                      print(f"  [+{name}] block={block} bal={bal:.6f} ({status})")
                      total += bal
                  else:
                      print(f"  [-{name}] NOT CONNECTED")
              except Exception as e:
                  print(f"  [-{name}] ERROR: {str(e)[:60]}")

          print(f"\n[TOTAL] {total:.6f} ETH across testnets")
          print("[SUCCESS] Connectivity test complete")
          PYEOF

      - name: Check balances
        if: inputs.action == 'status'
        run: |
          python3 << 'PYEOF'
          from web3 import Web3
          import json

          RPCS = {
              'Sepolia': 'https://rpc.sepolia.org',
              'Base Sepolia': 'https://sepolia.base.org',
              'Linea Sepolia': 'https://rpc.sepolia.linea.build',
              'Scroll Sepolia': 'https://rpc.ankr.com/scroll_sepolia',
              'Arbitrum Sepolia': 'https://sepolia-rollup.arbitrum.io/rpc',
              'Optimism Sepolia': 'https://sepolia.optimism.io',
              'Mode Sepolia': 'https://sepolia.mode.network',
          }

          wallet = '''${{ inputs.wallet_address }}'''.strip()
          print(f"[*] Balances for: {wallet}")
          print()

          results = {}
          for name, rpc in RPCS.items():
              try:
                  w = Web3(Web3.HTTPProvider(rpc, request_kwargs={'timeout': 10}))
                  if w.is_connected():
                      bal = w.eth.get_balance(wallet) / 1e18
                      block = w.eth.block_number
                      print(f"  [+{name}] {bal:.6f} ETH (block {block})")
                      results[name] = bal
              except Exception as e:
                  print(f"  [-{name}] {str(e)[:40]}")

          print(f"\n[RESULT] {json.dumps(results)}")
          print("[SUCCESS] Status check complete")
          PYEOF

      - name: Claim faucets
        if: inputs.action == 'claim'
        run: |
          python3 << 'PYEOF'
          import requests
          import json

          wallet = '''${{ inputs.wallet_address }}'''.strip()
          alchemy_key = '''${{ inputs.alchemy_key }}'''.strip()
          print(f"[*] Claiming faucets for: {wallet}")
          print()

          # 1. Try Alchemy (if key provided)
          if alchemy_key:
              try:
                  r = requests.post('https://api.sepolia.org/api/developer/faucet',
                      json={'address': wallet, 'secret': alchemy_key},
                      headers={'Content-Type': 'application/json'}, timeout=30)
                  if r.status_code == 200:
                      print(f"  [+] Alchemy Sepolia: SUCCESS")
                      print(f"      Response: {r.text[:200]}")
                  else:
                      print(f"  [-] Alchemy Sepolia: HTTP {r.status_code}")
                      print(f"      {r.text[:200]}")
              except Exception as e:
                  print(f"  [-] Alchemy: {e}")
          else:
              print("  [~] Alchemy: No API key provided (get free at alchemy.com)")

          # 2. Try faucetlink.xyz
          try:
              r = requests.get(f'https://www.faucetlink.xyz/api/claim?address={wallet}', timeout=15)
              print(f"  [~] FaucetLink: HTTP {r.status_code}")
          except Exception as e:
              print(f"  [-] FaucetLink: {str(e)[:50]}")

          # 3. Try direct Sepolia faucet
          try:
              r = requests.post('https://rpc.sepolia.org',
                  json={'jsonrpc':'2.0','method':'anvil_setBalance',
                        'params':[wallet, '0x21E19E0C9BAB2400000'], 'id':1},
                  headers={'Content-Type':'application/json'}, timeout=15)
              print(f"  [~] Sepolia RPC: HTTP {r.status_code}")
          except Exception as e:
              print(f"  [-] Sepolia RPC: {str(e)[:50]}")

          # 4. Try Paradigm faucet
          try:
              r = requests.post('https://faucet.paradigm.xyz/api/claim',
                  json={'address': wallet, 'chain_id': 11155111},
                  headers={'Content-Type': 'application/json'}, timeout=15)
              print(f"  [~] Paradigm: HTTP {r.status_code} - {r.text[:100]}")
          except Exception as e:
              print(f"  [-] Paradigm: {str(e)[:50]}")

          print("\n[SUCCESS] Faucet claim attempt complete")
          PYEOF

      - name: Full routine
        if: inputs.action == 'full'
        run: |
          python3 << 'PYEOF'
          from web3 import Web3
          import requests
          import json
          import time

          wallet = '''${{ inputs.wallet_address }}'''.strip()
          alchemy_key = '''${{ inputs.alchemy_key }}'''.strip()
          print(f"[*] FULL ROUTINE for: {wallet}")
          print()

          RPCS = {
              'Sepolia': 'https://rpc.sepolia.org',
              'Base Sepolia': 'https://sepolia.base.org',
              'Linea Sepolia': 'https://rpc.sepolia.linea.build',
              'Scroll Sepolia': 'https://rpc.ankr.com/scroll_sepolia',
              'Arbitrum Sepolia': 'https://sepolia-rollup.arbitrum.io/rpc',
              'Optimism Sepolia': 'https://sepolia.optimism.io',
              'Mode Sepolia': 'https://sepolia.mode.network',
          }

          # STEP 1: Claim faucets
          print("[STEP 1] Faucet claims...")
          faucets_claimed = 0

          if alchemy_key:
              try:
                  r = requests.post('https://api.sepolia.org/api/developer/faucet',
                      json={'address': wallet, 'secret': alchemy_key}, timeout=30)
                  if r.status_code == 200:
                      print(f"  [+] Alchemy: SUCCESS")
                      faucets_claimed += 1
                  else:
                      print(f"  [-] Alchemy: {r.status_code}")
              except Exception as e:
                  print(f"  [-] Alchemy: {str(e)[:50]}")

          # STEP 2: Check all balances
          print("\n[STEP 2] Balance check...")
          balances = {}
          for name, rpc in RPCS.items():
              try:
                  w = Web3(Web3.HTTPProvider(rpc, request_kwargs={'timeout': 10}))
                  if w.is_connected():
                      bal = w.eth.get_balance(wallet) / 1e18
                      block = w.eth.block_number
                      print(f"  [+{name}] {bal:.6f} ETH (block {block})")
                      balances[name] = {'balance': bal, 'block': block, 'connected': True}
                  else:
                      print(f"  [-{name}] NOT CONNECTED")
                      balances[name] = {'balance': 0, 'connected': False}
              except Exception as e:
                  print(f"  [-{name}] ERROR")
                  balances[name] = {'balance': 0, 'connected': False}

          # STEP 3: Activity on funded networks
          print("\n[STEP 3] Network activity...")
          from eth_account import Account
          acc = Account.create()  # This creates a temp wallet for testing

          funded = {k: v for k, v in balances.items() if v['connected'] and v['balance'] > 0.001}
          if funded:
              print(f"  Funded networks: {list(funded.keys())}")
              print("  (Need private key to sign on-chain transactions)")
          else:
              print("  No funded networks. Claim faucets first.")

          # Output summary
          total = sum(v['balance'] for v in balances.values())
          print(f"\n[SUMMARY]")
          print(f"  Networks connected: {sum(1 for v in balances.values() if v['connected'])}/{len(RPCS)}")
          print(f"  Networks funded: {len(funded)}")
          print(f"  Total ETH: {total:.6f}")
          print(f"  Faucets claimed: {faucets_claimed}")
          print(f"\n[RESULT] {json.dumps({'balances': balances, 'total': total, 'funded': list(funded.keys())})}")
          print("[SUCCESS] Full routine complete")
          PYEOF
