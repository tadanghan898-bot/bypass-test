name: LLM - ALL Providers (OpenAI + Claude + Groq + DeepSeek)
on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider: openai, claude, groq, deepseek, mistral, together'
        required: true
        default: 'groq'
      prompt:
        description: 'Prompt/message'
        required: true
      model:
        description: 'Model name (optional)'
        required: false
        default: ''
      system:
        description: 'System prompt (optional)'
        required: false
        default: ''

jobs:
  chat:
    runs-on: ubuntu-latest
    steps:
      - name: OpenAI GPT
        if: github.event.inputs.provider == 'openai'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Calling OpenAI GPT..."
          RESPONSE=$(curl -s -X POST \
            "https://api.openai.com/v1/chat/completions" \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "${{ github.event.inputs.model || '"'"'gpt-4o'"'"' }}",
              "messages": [
                {"role": "user", "content": "${{ github.event.inputs.prompt }}"}
              ],
              "temperature": 0.7,
              "max_tokens": 2048
            }' \
            --max-time 60)
          echo "$RESPONSE" | python3 -c "
import sys,json
d=json.load(sys.stdin)
content=d.get('choices',[{}])[0].get('message',{}).get('content','')
print('=== RESPONSE ===')
print(content)
print()
print('=== META ===')
print(f'Tokens: {d.get(\"usage\",{})}')
print(f'Model: {d.get(\"model\",\"\")}')
" 2>/dev/null || echo "$RESPONSE"

      - name: Claude
        if: github.event.inputs.provider == 'claude'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Calling Claude..."
          RESPONSE=$(curl -s -X POST \
            "https://api.anthropic.com/v1/messages" \
            -H "Authorization: Bearer ${ANTHROPIC_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "anthropic-version: 2023-06-01" \
            -d '{
              "model": "${{ github.event.inputs.model || '"'"'claude-sonnet-4-20250514'"'"' }}",
              "max_tokens": 4096,
              "messages": [
                {"role": "user", "content": "${{ github.event.inputs.prompt }}"}
              ]
            }' \
            --max-time 60)
          echo "$RESPONSE" | python3 -c "
import sys,json
d=json.load(sys.stdin)
content=d.get('content',[{}])[0].get('text','')
print('=== RESPONSE ===')
print(content)
print()
print('=== META ===')
print(f'Tokens: {d.get(\"usage\",{})}')
print(f'Model: {d.get(\"model\",\"\")}')
" 2>/dev/null || echo "$RESPONSE"

      - name: Groq (Fast)
        if: github.event.inputs.provider == 'groq'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Calling Groq (Fast!)..."
          RESPONSE=$(curl -s -X POST \
            "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer ${GROQ_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "${{ github.event.inputs.model || '"'"'llama-3.3-70b-versatile'"'"' }}",
              "messages": [
                {"role": "user", "content": "${{ github.event.inputs.prompt }}"}
              ],
              "temperature": 0.7,
              "max_tokens": 2048
            }' \
            --max-time 30)
          echo "$RESPONSE" | python3 -c "
import sys,json
d=json.load(sys.stdin)
content=d.get('choices',[{}])[0].get('message',{}).get('content','')
print('=== RESPONSE ===')
print(content)
print()
print('=== META ===')
print(f'Tokens: {d.get(\"usage\",{})}')
print(f'Model: {d.get(\"model\",\"\")}')
" 2>/dev/null || echo "$RESPONSE"

      - name: DeepSeek
        if: github.event.inputs.provider == 'deepseek'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "Calling DeepSeek..."
          RESPONSE=$(curl -s -X POST \
            "https://api.deepseek.com/v1/chat/completions" \
            -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "${{ github.event.inputs.model || '"'"'deepseek-chat'"'"' }}",
              "messages": [
                {"role": "user", "content": "${{ github.event.inputs.prompt }}"}
              ],
              "temperature": 0.7,
              "max_tokens": 2048
            }' \
            --max-time 60)
          echo "$RESPONSE" | python3 -c "
import sys,json
d=json.load(sys.stdin)
content=d.get('choices',[{}])[0].get('message',{}).get('content','')
print('=== RESPONSE ===')
print(content)
print()
print('=== META ===')
print(f'Tokens: {d.get(\"usage\",{})}')
print(f'Model: {d.get(\"model\",\"\")}')
" 2>/dev/null || echo "$RESPONSE"

      - name: Mistral
        if: github.event.inputs.provider == 'mistral'
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          echo "Calling Mistral..."
          RESPONSE=$(curl -s -X POST \
            "https://api.mistral.ai/v1/chat/completions" \
            -H "Authorization: Bearer ${MISTRAL_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "${{ github.event.inputs.model || '"'"'mistral-large-latest'"'"' }}",
              "messages": [
                {"role": "user", "content": "${{ github.event.inputs.prompt }}"}
              ],
              "temperature": 0.7
            }' \
            --max-time 60)
          echo "$RESPONSE" | python3 -c "
import sys,json
d=json.load(sys.stdin)
content=d.get('choices',[{}])[0].get('message',{}).get('content','')
print('=== RESPONSE ===')
print(content)
" 2>/dev/null || echo "$RESPONSE"

      - name: Together AI
        if: github.event.inputs.provider == 'together'
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: |
          echo "Calling Together AI..."
          RESPONSE=$(curl -s -X POST \
            "https://api.together.xyz/v1/chat/completions" \
            -H "Authorization: Bearer ${TOGETHER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "${{ github.event.inputs.model || '"'"'meta-llama/Llama-3-70b-chat-hf'"'"' }}",
              "messages": [
                {"role": "user", "content": "${{ github.event.inputs.prompt }}"}
              ],
              "temperature": 0.7
            }' \
            --max-time 60)
          echo "$RESPONSE" | python3 -c "
import sys,json
d=json.load(sys.stdin)
content=d.get('choices',[{}])[0].get('message',{}).get('content','')
print('=== RESPONSE ===')
print(content)
" 2>/dev/null || echo "$RESPONSE"
