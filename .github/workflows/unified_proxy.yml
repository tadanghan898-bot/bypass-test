          echo "$BODY" > groq_response.json

          echo "## Groq Proxy Result" >> $GITHUB_STEP_SUMMARY
          echo "**HTTP Status:** $HTTP" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$BODY" | head -c 2000 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Response
        uses: actions/upload-artifact@v4
        with:
          name: groq-proxy-response-${{ github.run_id }}
          path: groq_response.json
          retention-days: 1

  pollinations:
    needs: route
    if: inputs.provider == 'pollinations'
    runs-on: ubuntu-latest
    steps:
      - name: Pollinations Proxy
        run: |
          echo "=== POLLINATIONS PROXY ==="

          # Determine base URL based on endpoint
          ENDPOINT="${{ inputs.endpoint }}"
          if echo "$ENDPOINT" | grep -q "image-to-3d"; then
            BASE_URL="https://image-to-3d.pollinations.ai"
            EP_PATH=$(echo "$ENDPOINT" | sed 's|^/||')
          elif echo "$ENDPOINT" | grep -q "/image"; then
            BASE_URL="https://image.pollinations.ai"
            EP_PATH=$(echo "$ENDPOINT" | sed 's|^/||')
          else
            BASE_URL="https://text.pollinations.ai"
            EP_PATH=$(echo "$ENDPOINT" | sed 's|^/||')
          fi

          echo "Base URL: $BASE_URL"
          echo "Endpoint: $EP_PATH"

          if [ "${{ inputs.method }}" = "GET" ]; then
            FULL_URL="$BASE_URL/$EP_PATH"
            if [ -n "${{ inputs.body }}" ] && [ "${{ inputs.body }}" != "null" ]; then
              # Convert JSON body to query params for GET
              PARAMS=$(echo '${{ inputs.body }}' | python3 -c "import sys,json,urllib.parse; d=json.load(sys.stdin); print('&'.join(f'{k}={urllib.parse.quote(str(v))}' for k,v in d.items()))" 2>/dev/null)
              FULL_URL="$FULL_URL?$PARAMS"
            fi
            echo "GET: $FULL_URL"
            RESPONSE=$(curl -s -X GET "$FULL_URL" -w "\n%{http_code}" --max-time 120)
          else
            echo "POST: $BASE_URL/$EP_PATH"
            RESPONSE=$(curl -s -X POST \
              "$BASE_URL/$EP_PATH" \
              -H "Content-Type: application/json" \
              -d '${{ inputs.body }}' \
              -w "\n%{http_code}" \
              --max-time 120)
          fi

          HTTP=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP"
          echo "Response: $BODY"
          echo "$BODY" > pollinations_response.json

          echo "## Pollinations Proxy Result" >> $GITHUB_STEP_SUMMARY
          echo "**HTTP Status:** $HTTP" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$BODY" | head -c 2000 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Response
        uses: actions/upload-artifact@v4
        with:
          name: pollinations-proxy-response-${{ github.run_id }}
          path: pollinations_response.json
          retention-days: 1

