name: Unified Cloud Proxy
on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider: meshyl, tripo3d, luma, stability, replicate, fal, groq, hf, openai, openrouter, pollinations'
        required: true
        type: choice
        options:
          - meshyl
          - tripo3d
          - luma
          - stability
          - replicate
          - fal
          - groq
          - hf
          - openai
          - openrouter
          - pollinations
      endpoint:
        description: 'API endpoint path (e.g. /openapi/v2/text-to-3d)'
        required: true
        type: string
      method:
        description: 'HTTP method'
        required: true
        type: choice
        options:
          - GET
          - POST
          - PUT
          - DELETE
      body:
        description: 'JSON body for POST/PUT requests'
        required: false
        type: string
      api_key:
        description: 'API key (or leave blank to use stored secrets)'
        required: false
        type: string
      polling:
        description: 'Enable async polling (true for text-to-3d style tasks)'
        required: false
        type: boolean
        default: false
      poll_interval:
        description: 'Polling interval in seconds'
        required: false
        type: string
        default: '10'
      max_polls:
        description: 'Max polling attempts'
        required: false
        type: string
        default: '60'

env:
  MESHY_API_KEY: ${{ secrets.MESHY_MSY_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
  REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
  FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Unified Proxy - Routing
        id: route
        run: |
          echo "=== UNIFIED CLOUD PROXY ==="
          echo "Provider: ${{ inputs.provider }}"
          echo "Endpoint: ${{ inputs.endpoint }}"
          echo "Method: ${{ inputs.method }}"
          echo "Polling: ${{ inputs.polling }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run Attempt: ${{ github.run_attempt }}"

          # Route via provider-specific job
          echo "provider=${{ inputs.provider }}" >> $GITHUB_OUTPUT
          echo "endpoint=${{ inputs.endpoint }}" >> $GITHUB_OUTPUT

  meshyl:
    needs: route
    if: inputs.provider == 'meshyl'
    runs-on: ubuntu-latest
    steps:
      - name: Meshy AI Proxy
        run: |
          echo "=== MESHY AI PROXY ==="
          API_KEY="${MESHY_API_KEY:-${{ inputs.api_key }}}"
          if [ -z "$API_KEY" ]; then
            echo "ERROR: No API key provided"
            exit 1
          fi

          if [ "${{ inputs.method }}" = "GET" ]; then
            echo "GET: https://api.meshy.ai${{ inputs.endpoint }}"
            RESPONSE=$(curl -s -X GET \
              "https://api.meshy.ai${{ inputs.endpoint }}" \
              -H "Authorization: Bearer $API_KEY" \
              -H "Content-Type: application/json" \
              -H "X-Api-Version: v2026.04.03.post7" \
              -w "\n%{http_code}" \
              --max-time 120)
          else
            echo "POST: https://api.meshy.ai${{ inputs.endpoint }}"
            BODY='${{ inputs.body }}'
            RESPONSE=$(curl -s -X POST \
              "https://api.meshy.ai${{ inputs.endpoint }}" \
              -H "Authorization: Bearer $API_KEY" \
              -H "Content-Type: application/json" \
              -H "X-Api-Version: v2026.04.03.post7" \
              -d "$BODY" \
              -w "\n%{http_code}" \
              --max-time 120)
          fi

          HTTP=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP"
          echo "Response: $BODY"
          echo "$BODY" > meshy_response.json

          # Write to step summary
          echo "## Meshy AI Proxy Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**HTTP Status:** $HTTP" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$BODY" | head -c 2000 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.polling }}" = "true" ]; then
            echo "=== ASYNC POLLING MODE ==="
            TASK_ID=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id', d.get('task_id', '')))" 2>/dev/null)
            if [ -n "$TASK_ID" ]; then
              echo "Task ID: $TASK_ID"
              echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT
              for i in $(seq 1 ${{ inputs.max_polls }}); do
                sleep ${{ inputs.poll_interval }}
                STATUS_RESP=$(curl -s "https://api.meshy.ai${{ inputs.endpoint }}/${TASK_ID}" \
                  -H "Authorization: Bearer $API_KEY" \
                  -H "X-Api-Version: v2026.04.03.post7" \
                  --max-time 30)
                STATUS=$(echo "$STATUS_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status', 'UNKNOWN'))" 2>/dev/null)
                echo "[$((i * ${{ inputs.poll_interval }}))s] Status: $STATUS"
                if [ "$STATUS" = "SUCCEEDED" ] || [ "$STATUS" = "completed" ]; then
                  echo "TASK SUCCEEDED!"
                  echo "$STATUS_RESP" > meshy_result.json
                  echo "status=SUCCEEDED" >> $GITHUB_OUTPUT
                  break
                elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "FAILED" ]; then
                  echo "TASK FAILED!"
                  echo "status=FAILED" >> $GITHUB_OUTPUT
                  exit 1
                fi
              done
            fi
          fi

      - name: Upload Response
        uses: actions/upload-artifact@v4
        with:
          name: meshy-proxy-response-${{ github.run_id }}
          path: meshy_response.json
          retention-days: 1

