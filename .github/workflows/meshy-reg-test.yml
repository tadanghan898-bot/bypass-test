name: Meshy Reg Test
on:
  push:
    branches: [register]

jobs:
  reg:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Test mail.tm
        run: |
          echo "=== Testing mail.tm ==="
          DOMAIN=$(curl -s "https://api.mail.tm/domains" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['hydra:member'][0]['domain'])")
          echo "Domain: $DOMAIN"
          
          EMAIL="mesh$(date +%s)@$DOMAIN"
          PASS="TestPass123!"
          
          echo "Creating account: $EMAIL"
          ACCT=$(curl -s -X POST "https://api.mail.tm/accounts" \
            -H "Content-Type: application/json" \
            -d "{\"address\":\"$EMAIL\",\"password\":\"$PASS\"}")
          echo "Account: $ACCT"
          
          TOKEN=$(curl -s -X POST "https://api.mail.tm/token" \
            -H "Content-Type: application/json" \
            -d "{\"address\":\"$EMAIL\",\"password\":\"$PASS\"}")
          echo "Token: $TOKEN"
          
          if echo "$TOKEN" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if 'token' in d else 1)" 2>/dev/null; then
            MT_TOKEN=$(echo "$TOKEN" | python3 -c "import json,sys; print(json.load(sys.stdin)['token'])")
            echo "MT_TOKEN OK: ${#MT_TOKEN} chars"
            
            # Send Meshy OTP
            SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZnJlY2xzeGZncW52Z2ZweGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU1ODQwNjUsImV4cCI6MjAzMTE2MDA2NX0.015muXUW_O30jeBOxEU9-TQOJigcKMUhkNFbPOWu_iA"
            
            CODE_CHALLENGE=$(python3 -c "
import hashlib, base64, os
d = os.urandom(32)
h = hashlib.sha256(d).digest()
print(base64.urlsafe_b64encode(h).rstrip(b'=').decode())
")
            
            echo "Sending Meshy OTP..."
            OTP_RESP=$(curl -s -X POST "https://auth.meshy.ai/auth/v1/otp" \
              -H "apikey: $SUPABASE_KEY" \
              -H "authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/json" \
              -H "origin: https://www.meshy.ai" \
              -H "referer: https://www.meshy.ai/" \
              -d "{\"email\":\"$EMAIL\",\"create_user\":true,\"code_challenge\":\"$CODE_CHALLENGE\",\"code_challenge_method\":\"s256\"}")
            echo "OTP Resp: $OTP_RESP"
            
            echo "Waiting for OTP..."
            for i in $(seq 1 12); do
              sleep 5
              MSGS=$(curl -s "https://api.mail.tm/messages" \
                -H "Authorization: Bearer $MT_TOKEN")
              MSG_ID=$(echo "$MSGS" | python3 -c "import json,sys; d=json.load(sys.stdin); msgs=d.get('hydra-member',[]); print(msgs[0]['id'] if msgs else '')" 2>/dev/null)
              if [ -n "$MSG_ID" ]; then
                HTML=$(curl -s "https://api.mail.tm/messages/$MSG_ID" \
                  -H "Authorization: Bearer $MT_TOKEN")
                OTP=$(echo "$HTML" | grep -oE '[0-9]{4,8}' | head -1)
                if [ -n "$OTP" ]; then
                  echo "OTP: $OTP"
                  break
                fi
              fi
              echo "Wait $i/12"
            done
            
            if [ -n "$OTP" ]; then
              echo "=== Verifying ==="
              VERIFY=$(curl -s -X POST "https://auth.meshy.ai/auth/v1/verify" \
                -H "apikey: $SUPABASE_KEY" \
                -H "authorization: Bearer $SUPABASE_KEY" \
                -H "Content-Type: application/json" \
                -H "origin: https://www.meshy.ai" \
                -d "{\"type\":\"email\",\"email\":\"$EMAIL\",\"token\":\"$OTP\"}")
              echo "Verify: $VERIFY"
              
              if echo "$VERIFY" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get('access_token') else 1)" 2>/dev/null; then
                echo "=== SUCCESS! ==="
                echo "$VERIFY" | python3 -c "
import json,sys
d=json.load(sys.stdin)
print('Email:', '$EMAIL')
print('Access Token:', d['access_token'][:50]+'...')
print('Expires in:', d.get('expires_in'))
"
              fi
            else
              echo "OTP not found"
            fi
          else
            echo "mail.tm token failed"
          fi
