name: Meshy Ultimate Bypass Engine
on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Iterations'
        required: false
        default: '999'
  schedule:
    - cron: '*/3 * * * *'  # Every 3 minutes

env:
  MESHY_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZnJlY2xzeGZncW52Z2ZweGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU1ODQwNjUsImV4cCI6MjAzMTE2MDA2NX0.015muXUW_O30jeBOxEU9-TQOJigcKMUhkNFbPOWu_iA
  GH_CLIENT_ID: Ov23lizZ7qhYafAtFjNb

jobs:
  # Method 1: Guerrillamail + GitHub Device Flow
  method1_guerrillamail:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Guerrillamail + GitHub OAuth
        run: |
          node << 'NODEEOF'
const https = require('https');
const fs = require('fs');

const MESHY_KEY = process.env.MESHY_KEY;
const GH_CLIENT_ID = process.env.GH_CLIENT_ID;

async function fetch(url, options = {}) {
  return new Promise((resolve) => {
    const u = new URL(url);
    const req = https.request({
      hostname: u.hostname, port: 443,
      path: u.pathname + u.search,
      method: options.method || 'GET',
      headers: options.headers || {},
    }, res => {
      let d = '';
      res.on('data', c => d += c);
      res.on('end', () => resolve({ status: res.statusCode, body: d, headers: res.headers }));
    });
    req.on('error', e => resolve({ status: 0, body: e.message }));
    if (options.body) req.write(options.body);
    req.end();
  });
}

async function getGuerrillamailSession() {
  const r = await fetch('https://api.guerrillamail.com/ajax.php?f=get_email_address');
  const data = JSON.parse(r.body || '{}');
  return { email: data.email_addr, sid: data.sid_token };
}

async function checkInbox(sid) {
  const r = await fetch(`https://api.guerrillamail.com/ajax.php?f=check_email&sid_token=${sid}`);
  return JSON.parse(r.body || '{}');
}

async function getEmail(sid, emailId) {
  const r = await fetch(`https://api.guerrillamail.com/ajax.php?f=fetch_email&sid_token=${sid}&email_id=${emailId}`);
  return JSON.parse(r.body || '{}');
}

async function main() {
  console.log('=== METHOD 1: Guerrillamail + GitHub OAuth ===\n');

  // Get guerrillamail email
  console.log('[1] Getting guerrillamail session...');
  const session = await getGuerrillamailSession();
  if (!session.email) {
    console.log('[1a] Failed to get guerrillamail session:', session);
    // Try alternative endpoint
    const r2 = await fetch('https://www.guerrillamailblock.com/ajax.php?f=get_email_address');
    const data2 = JSON.parse(r2.body || '{}');
    session.email = data2.email_addr;
    session.sid = data2.sid_token;
  }
  console.log('[2] Email:', session.email, 'SID:', session.sid ? session.sid.substring(0, 20) : 'none');

  // Check if email is valid
  if (!session.email || !session.email.includes('@')) {
    console.log('[2a] Invalid guerrillamail email. Trying alternative...');
    // Try guerrillamailblock.com
    const r3 = await fetch('https://www.guerrillamailblock.com/ajax.php?f=get_email_address');
    const data3 = JSON.parse(r3.body || '{}');
    console.log('[2b] guerrillamailblock:', data3);
    if (data3.email_addr) {
      session.email = data3.email_addr;
      session.sid = data3.sid_token;
    }
  }

  if (!session.email) {
    console.log('[2c] All Guerrillamail attempts failed');
    process.exit(1);
  }

  // Initiate GitHub OAuth device flow
  console.log('\n[3] Starting GitHub OAuth device flow...');
  const deviceResp = await fetch('https://github.com/login/device/code', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
    body: `client_id=${GH_CLIENT_ID}&scope=user:email,read:user`,
  });
  console.log('[3a] Device response:', deviceResp.status, deviceResp.body.substring(0, 200));
  const deviceData = JSON.parse(deviceResp.body || '{}');

  if (deviceData.device_code && deviceData.user_code) {
    console.log('[3b] Device code:', deviceData.device_code);
    console.log('[3c] User code:', deviceData.user_code);
    console.log('[3d] Verification URL:', deviceData.verification_uri);

    // Poll for token
    for (let i = 0; i < 30; i++) {
      await new Promise(r => setTimeout(r, deviceData.interval || 5000));

      const pollResp = await fetch('https://github.com/login/oauth/access_token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
        body: `client_id=${GH_CLIENT_ID}&device_code=${deviceData.device_code}&grant_type=urn:ietf:params:oauth:grant-type:device_code`,
      });
      const pollData = JSON.parse(pollResp.body || '{}');
      console.log(`[3e] Poll ${i+1}:`, pollData);

      if (pollData.access_token) {
        console.log('\n[4] Got GitHub OAuth token!');
        console.log('[5] Token:', pollData.access_token.substring(0, 50), '...');

        // Exchange GitHub token for Meshy session via OAuth callback
        // We need to do the full OAuth flow. Let's check if we can get a code
        console.log('[6] Attempting to create Meshy session...');

        // Try the OAuth authorize endpoint
        const state = Math.random().toString(36).substring(2, 30);
        const authorizeUrl = `https://auth.meshy.ai/auth/v1/authorize?provider=github&redirect_to=https://www.meshy.ai&state=${state}&response_type=code`;
        console.log('[6a] Authorize URL:', authorizeUrl);

        const authResp = await fetch(authorizeUrl, {
          headers: {
            'Accept': 'text/html',
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/137.0.0.0',
          }
        });
        console.log('[6b] Auth response:', authResp.status);

        if (authResp.body && authResp.body.includes('github.com')) {
          console.log('[6c] Redirects to GitHub - we have the device code already!');
          // GitHub should auto-authorize since we're in the flow
        }

        break;
      }
      if (pollData.error && pollData.error !== 'authorization_pending') {
        console.log('[3f] Error:', pollData.error_description);
        break;
      }
    }
  } else {
    console.log('[3g] No device_code returned');
  }

  // Poll guerrillamail for any emails
  console.log('\n[7] Polling guerrillamail for emails...');
  for (let i = 0; i < 12; i++) {
    await new Promise(r => setTimeout(r, 5000));
    const inbox = await checkInbox(session.sid);
    const emails = inbox.list || [];
    console.log(`[7a] Poll ${i+1}: ${emails.length} emails`);
    if (emails.length > 0) {
      for (const email of emails.slice(0, 3)) {
        const full = await getEmail(session.sid, email.guid);
        console.log(`[7b] From: ${full.from}, Subject: ${full.subject}`);
        console.log(`[7c] Body: ${(full.body || '').substring(0, 500)}`);
      }
      break;
    }
  }

  // Try Meshy API with guerrillamail email
  console.log('\n[8] Testing Meshy API directly...');
  const balanceResp = await fetch('https://api.meshy.ai/openapi/v1/balance', {
    headers: { 'Authorization': `Bearer ${MESHY_KEY}`, 'X-Api-Version': 'v2026.04.03.post7' }
  });
  console.log('[8a] Balance:', balanceResp.status, balanceResp.body.substring(0, 200));

  // Save session info
  fs.writeFileSync('m1_session.json', JSON.stringify(session));
  fs.writeFileSync('m1_result.txt', `Session: ${session.email}\nSID: ${session.sid}`);
  console.log('\nDone Method 1.');
}

main().catch(e => { console.error('ERROR:', e.message); process.exit(1); });
NODEEOF

