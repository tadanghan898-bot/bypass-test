          echo '-- Search: instruct model --'
          curl -s --max-time 15 "https://huggingface.co/api/models?search=instruct&sort=downloads&direction=-1&limit=10" 2>/dev/null | python3 -c "
import sys,json
for m in json.load(sys.stdin):
