          curl -s --max-time 15 "https://huggingface.co/api/spaces?search=video+generation&sort=likes&direction=-1&limit=20" 2>/dev/null | python3 -c "
import sys,json
for s in json.load(sys.stdin):
    print(f'  {s[\"id\"]} | {s.get(\"likes\",0):,} likes')" 2>/dev/null

          echo '-- Wan2 Video --'
          curl -s --max-time 15 "https://huggingface.co/api/spaces?search=wan2&sort=likes&direction=-1&limit=10" 2>/dev/null | python3 -c "
import sys,json
for s in json.load(sys.stdin):
    print(f'  {s[\"id\"]} | {s.get(\"likes\",0):,} likes')" 2>/dev/null

          echo '-- SORA-like --'
          curl -s --max-time 15 "https://huggingface.co/api/spaces?search=sora&sort=likes&direction=-1&limit=10" 2>/dev/null | python3 -c "
import sys,json
for s in json.load(sys.stdin):
    print(f'  {s[\"id\"]} | {s.get(\"likes\",0):,} likes')" 2>/dev/null

