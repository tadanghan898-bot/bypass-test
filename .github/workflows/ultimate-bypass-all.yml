          curl -s --max-time 15 "https://huggingface.co/api/spaces?search=vision+language&sort=likes&direction=-1&limit=10" 2>/dev/null | python3 -c "
import sys,json
for s in json.load(sys.stdin):
    print(f'  {s[\"id\"]} | {s.get(\"likes\",0):,} likes')" 2>/dev/null

          echo '-- Image Editing --'
          curl -s --max-time 15 "https://huggingface.co/api/spaces?search=image+edit&sort=likes&direction=-1&limit=10" 2>/dev/null | python3 -c "
