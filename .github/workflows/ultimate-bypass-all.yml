          echo '=== HF 3D SPACES ==='

          echo '-- Top 3D Spaces --'
          curl -s --max-time 15 "https://huggingface.co/api/spaces?search=3d&sort=likes&direction=-1&limit=20" 2>/dev/null | python3 -c "
import sys,json
for s in json.load(sys.stdin):
    print(f'  {s[\"id\"]} | {s.get(\"likes\",0):,} likes | sdk={s.get(\"sdk\",s.get(\"runtime\",\"?\"))}')" 2>/dev/null

          echo '-- Image-to-3D Spaces --'
          curl -s --max-time 15 "https://huggingface.co/api/spaces?search=image+to+3d&sort=likes&direction=-1&limit=20" 2>/dev/null | python3 -c "
import sys,json
for s in json.load(sys.stdin):
