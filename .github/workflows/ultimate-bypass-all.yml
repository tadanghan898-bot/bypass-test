for s in json.load(sys.stdin):
    print(f'  {s[\"id\"]} | {s.get(\"likes\",0):,} likes')" 2>/dev/null

          echo '-- Background Removal --'
          curl -s --max-time 15 "https://huggingface.co/api/spaces?search=background+removal&sort=likes&direction=-1&limit=10" 2>/dev/null | python3 -c "
import sys,json
for s in json.load(sys.stdin):
    print(f'  {s[\"id\"]} | {s.get(\"likes\",0):,} likes')" 2>/dev/null

  # ============ AI PROXY SERVICES ============
  ai-proxy-test:
    runs-on: ubuntu-latest
    steps:
      - name: AI Proxy Services Connectivity
        run: |
          echo '=== AI PROXY SERVICES CONNECTIVITY ==='

          echo '-- Groq --'
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" --max-time 10 "https://api.groq.com/openai/v1/models" 2>/dev/null || echo "FAIL"

          echo '-- Together AI --'
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" --max-time 10 "https://api.together.xyz/v1/models" 2>/dev/null || echo "FAIL"

          echo '-- Cerebras --'
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" --max-time 10 "https://api.cerebras.ai/v1/models" 2>/dev/null || echo "FAIL"

          echo '-- DeepInfra --'
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" --max-time 10 "https://api.deepinfra.com/v1/models" 2>/dev/null || echo "FAIL"

          echo '-- OpenRouter --'
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" --max-time 10 "https://openrouter.ai/api/v1/models" 2>/dev/null || echo "FAIL"

          echo '-- Lepton AI --'
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" --max-time 10 "https://llm.lepton.ai/api/v1/models" 2>/dev/null || echo "FAIL"

          echo '-- Replicate --'
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" --max-time 10 "https://api.replicate.com/v1/models" 2>/dev/null || echo "FAIL"

          echo '-- Anyscale --'
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" --max-time 10 "https://api.endpoints.anyscale.com/v1/models" 2>/dev/null || echo "FAIL"

          echo '-- Perplexity --'
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" --max-time 10 "https://api.perplexity.ai/models" 2>/dev/null || echo "FAIL"

  # ============ 3D CLOUD SERVICES ============
  cloud-3d-services:
    runs-on: ubuntu-latest
    steps:
      - name: 3D Cloud Services
        run: |
          echo '=== 3D CLOUD SERVICES ==='

          echo '-- Meshy AI --'
          for ep in image-to-3d text-to-3d remesh rigging retexture text-to-image balance; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -X POST \
              "https://api.meshy.ai/openapi/v1/$ep" \
              -H "Authorization: Bearer test" \
              -H "Content-Type: application/json" \
              -H "X-Api-Version: v2026.04.03.post7" \
              -d '{}' 2>/dev/null || echo "FAIL")
            echo "  $ep: $code"
          done

          echo '-- Tripo3D --'
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" --max-time 10 "https://api.tripo3d.ai/" 2>/dev/null || echo "FAIL"
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" --max-time 10 "https://api.tripo3d.ai/v2/models" 2>/dev/null || echo "FAIL"

          echo '-- Luma Labs --'
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" --max-time 10 "https://api.lumalabs.ai/" 2>/dev/null || echo "FAIL"

          echo '-- Stability AI --'
          curl -s -o /dev/null -w "HTTP:%{http_code}\n" --max-time 10 "https://api.stability.ai/v1/engines" 2>/dev/null || echo "FAIL"

          echo '-- Zero123++ via Replicate --'
          curl -s "https://api.replicate.com/v1/models" 2>/dev/null | python3 -c "
import sys,json
data=json.load(sys.stdin)
for m in data.get('results',[]):
    if 'zero' in m.get('name','').lower() or '3d' in m.get('name','').lower() or 'splat' in m.get('name','').lower():
        print(f'  {m[\"owner\"]}/{m[\"name\"]}')" 2>/dev/null || echo "FAIL"

  # ============ SUMMARY ============
  summary:
    runs-on: ubuntu-latest
    needs: [hf-3d-models, hf-3d-spaces, hf-image-models, hf-image-spaces, hf-video-models, hf-video-spaces, hf-llm-models, hf-audio-spaces, hf-multimodal-spaces, ai-proxy-test, cloud-3d-services]
    steps:
      - name: Summary
        run: |
          echo '=============================================='
          echo 'ULTIMATE BYPASS - ALL CATEGORIES COMPLETE'
          echo '=============================================='
          echo 'All 11 scan jobs completed!'
          echo ''
          echo 'CATEGORIES SCANNED:'
          echo '  - 3D Generation Models & Spaces'
          echo '  - Image Generation Models & Spaces'
          echo '  - Video Generation Models & Spaces'
          echo '  - LLM Models'
          echo '  - Audio / TTS Spaces'
          echo '  - Multimodal Spaces'
          echo '  - AI Proxy Services'
          echo '  - 3D Cloud Services'
          echo ''
          echo 'TOTAL: 11 parallel jobs = MAXIMUM COVERAGE'
