name: ULTIMATE BYPASS - ALL CATEGORIES
on:
  workflow_dispatch:

jobs:
  # ============ 3D GENERATION ============
  hf-3d-models:
    runs-on: ubuntu-latest
    steps:
      - name: HF 3D Models Scan
        run: |
          echo '=== HF 3D GENERATION MODELS ==='

          # Image to 3D
          echo '-- Image to 3D --'
          for model in "tencent/Hunyuan3D-2" "tencent/Hunyuan3D-2.1" "tencent/Hunyuan3D-2mini" "TencentARC/InstantMesh" "CompVis/stable-diffusion-v1-4"; do
            echo -n "$model: "
            curl -s --max-time 10 "https://huggingface.co/api/models/$model" 2>/dev/null | python3 -c "
import sys,json; d=json.load(sys.stdin); print(f'{d.get(\"downloads\",0):,} downloads, tags={d.get(\"tags\",[])[:3]}')" 2>/dev/null || echo "FAIL"
          done

          # Gaussian Splatting
          echo '-- Gaussian Splatting --'
          for model in "camenduru/gaussian-splatting" "kishimisu/3d-gaussian-splatting-webgl"; do
            echo -n "$model: "
            curl -s --max-time 10 "https://huggingface.co/api/models/$model" 2>/dev/null | python3 -c "
import sys,json; d=json.load(sys.stdin); print(f'{d.get(\"downloads\",0):,} downloads')" 2>/dev/null || echo "FAIL"
          done

          # Search 3D
          echo '-- Search: 3D generation --'
          curl -s --max-time 15 "https://huggingface.co/api/models?search=3d+generation&sort=downloads&direction=-1&limit=10" 2>/dev/null | python3 -c "
import sys,json
for m in json.load(sys.stdin):
    print(f'  {m[\"id\"]} | {m.get(\"downloads\",0):,} downloads')" 2>/dev/null

          # Search image to 3D
          echo '-- Search: image-to-3d --'
          curl -s --max-time 15 "https://huggingface.co/api/models?search=image-to-3d&sort=downloads&direction=-1&limit=10" 2>/dev/null | python3 -c "
import sys,json
for m in json.load(sys.stdin):
    print(f'  {m[\"id\"]} | {m.get(\"downloads\",0):,} downloads')" 2>/dev/null

          # Search gaussian splatting
          echo '-- Search: gaussian-splatting --'
          curl -s --max-time 15 "https://huggingface.co/api/models?search=gaussian+splatting&sort=downloads&direction=-1&limit=10" 2>/dev/null | python3 -c "
import sys,json
for m in json.load(sys.stdin):
    print(f'  {m[\"id\"]} | {m.get(\"downloads\",0):,} downloads')" 2>/dev/null

