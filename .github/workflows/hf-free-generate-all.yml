          echo "Likes: $(curl -s 'https://huggingface.co/api/spaces/tencent/Hunyuan3D-2' 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get(\"likes\",0))' 2>/dev/null || echo 'N/A')"

          echo ""
          echo "-- Testing InstantMesh Space --"
