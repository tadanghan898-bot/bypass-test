name: HF FREE GENERATE - All Models
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Generation prompt
        required: false
        default: "a beautiful dragon"

jobs:
  # ============ HF PIPELINE MODELS (FREE) ============
  hf-sd-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: HF Stable Diffusion FREE Generation
        run: |
          pip install diffusers transformers accelerate torch --quiet 2>/dev/null

          python3 << 'PYEOF'
import torch
from diffusers import StableDiffusionPipeline

print("=== HF FREE IMAGE GENERATION ===")
print("Loading: stabilityai/stable-diffusion-2-1 (FREE, no API key)")

try:
    pipe = StableDiffusionPipeline.from_pretrained(
        "stabilityai/stable-diffusion-2-1",
        torch_dtype=torch.float16 if torch.cuda.is_available() else torch.float32,
        safety_checker=None
    )
    if torch.cuda.is_available():
        pipe = pipe.to("cuda")

    prompt = "${{ github.event.inputs.prompt || 'a beautiful dragon' }}"
    print(f"Generating: {prompt}")

    image = pipe(prompt, num_inference_steps=20, guidance_scale=7.5).images[0]
    image.save("/tmp/generated_image.png")
    print("SUCCESS: Image saved to /tmp/generated_image.png")
except Exception as e:
    print(f"ERROR: {e}")

print("=== DONE ===")
PYEOF

      - name: Upload Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hf-generated-image
          path: /tmp/generated_image.png

  hf-clip-search:
    runs-on: ubuntu-latest
    steps:
      - name: HF CLIP FREE Search
        run: |
          pip install transformers torch --quiet 2>/dev/null

          python3 << 'PYEOF'
import requests
import json

print("=== HF FREE CLIP SEARCH ===")

# Search for models
searches = [
    ("image to 3d", "https://huggingface.co/api/models?search=image+to+3d&sort=downloads&direction=-1&limit=10"),
    ("3d generation", "https://huggingface.co/api/models?search=3d+generation&sort=downloads&direction=-1&limit=10"),
    ("gaussian splatting", "https://huggingface.co/api/spaces?search=gaussian+splatting&sort=likes&direction=-1&limit=10"),
    ("stable fast 3d", "https://huggingface.co/api/spaces?search=stable-fast-3d&sort=likes&direction=-1&limit=10"),
    ("Hunyuan3D", "https://huggingface.co/api/spaces?search=Hunyuan3D&sort=likes&direction=-1&limit=10"),
    ("InstantMesh", "https://huggingface.co/api/spaces?search=InstantMesh&sort=likes&direction=-1&limit=10"),
    ("TRELLIS 3D", "https://huggingface.co/api/spaces?search=TRELLIS&sort=likes&direction=-1&limit=10"),
]

for name, url in searches:
    print(f"\n--- {name.upper()} ---")
    try:
        r = requests.get(url, timeout=15)
        data = r.json()
        if isinstance(data, list):
            for item in data[:5]:
                if 'id' in item:
                    print(f"  {item['id']} | likes={item.get('likes',0)}")
                elif 'downloads' in item:
                    print(f"  {item['id']} | downloads={item.get('downloads',0)}")
        elif 'data' in data:
            for item in data['data'][:5]:
                print(f"  {item.get('id', item.get('name','?'))}")
    except Exception as e:
        print(f"  ERROR: {e}")

print("\n=== SEARCH COMPLETE ===")
PYEOF

  hf-top-models-scan:
    runs-on: ubuntu-latest
    steps:
      - name: HF TOP Models Scan ALL Categories
        run: |
          python3 << 'PYEOF'
import requests
import json

print("========================================")
print("HF TOP MODELS - ALL CATEGORIES")
print("========================================")

# Search queries for EVERYTHING
categories = {
    "3D_GENERATION": ("models", "3d+generation", "downloads"),
    "IMAGE_TO_3D": ("models", "image-to-3d", "downloads"),
    "GAUSSIAN_SPLAT": ("models", "gaussian+splatting", "downloads"),
    "NEURAL_RADIANCE": ("models", "neural+radiance+field", "downloads"),
    "TEXT_TO_IMAGE": ("models", "text-to-image+diffusion", "downloads"),
    "IMAGE_TO_IMAGE": ("models", "image-to-image", "downloads"),
    "VIDEO_GENERATION": ("models", "video+generation", "downloads"),
    "LLM_INSTRUCT": ("models", "instruct", "downloads"),
    "VISION_LANGUAGE": ("models", "vision+language", "downloads"),
    "SPEECH_TTS": ("models", "text-to-speech", "downloads"),
    "AUDIO_GENERATION": ("models", "audio+generation", "downloads"),
    "EMBEDDINGS": ("models", "embeddings", "downloads"),
    "IMAGE_CLASSIFICATION": ("models", "image+classification", "downloads"),
    "OBJECT_DETECTION": ("models", "object+detection", "downloads"),
    "SEGMENTATION": ("models", "segmentation", "downloads"),
    "FACE_RECOGNITION": ("models", "face+recognition", "downloads"),
    "OCR": ("models", "ocr", "downloads"),
    "TRANSLATION": ("models", "translation", "downloads"),
    "SUMMARIZATION": ("models", "summarization", "downloads"),
    "CODE_GENERATION": ("models", "code+generation", "downloads"),
    "3D_SPACES": ("spaces", "3d", "likes"),
    "IMAGE_EDIT_SPACES": ("spaces", "image+edit", "likes"),
    "TTS_SPACES": ("spaces", "text+to+speech", "likes"),
    "VOICE_CLONE_SPACES": ("spaces", "voice+clone", "likes"),
    "MUSIC_SPACES": ("spaces", "music+generation", "likes"),
    "VIDEO_SPACES": ("spaces", "video+generation", "likes"),
}

for cat, (api_type, query, sort) in categories.items():
    print(f"\n{'='*50}")
    print(f"CATEGORY: {cat}")
    print(f"{'='*50}")
    try:
        url = f"https://huggingface.co/api/{api_type}?search={query}&sort={sort}&direction=-1&limit=10"
        r = requests.get(url, timeout=15)
        data = r.json()
        if isinstance(data, list):
            for item in data[:10]:
                if 'id' in item:
                    print(f"  {item['id']} | {item.get(sort,0):,} {sort}")
                elif 'name' in item:
                    print(f"  {item['name']}")
        elif 'data' in data:
            for item in data['data'][:10]:
                print(f"  {item.get('id', item.get('name','?'))}")
    except Exception as e:
        print(f"  ERROR: {e}")

print("\n" + "="*50)
print("ALL CATEGORIES SCAN COMPLETE!")
print("="*50)
PYEOF

  # ============ 3D GENERATION VIA HF SPACES ============
  hf-3d-spaces-test:
    runs-on: ubuntu-latest
    steps:
      - name: HF 3D Spaces Test
        run: |
          echo "=== HF 3D SPACES - TESTING LIVE ==="

          echo ""
          echo "-- Testing Hunyuan3D Space --"
