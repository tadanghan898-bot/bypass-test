          echo ""
          echo "-- Testing Stable Fast 3D --"
          echo "Space: stabilityai/stable-fast-3d"
          echo "Likes: $(curl -s 'https://huggingface.co/api/spaces/stabilityai/stable-fast-3d' 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get(\"likes\",0))' 2>/dev/null || echo 'N/A')"

          echo ""
          echo "-- Testing TRELLIS --"
          echo "Space: microsoft/TRELLIS"
          echo "Likes: $(curl -s 'https://huggingface.co/api/spaces/microsoft/TRELLIS' 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get(\"likes\",0))' 2>/dev/null || echo 'N/A')"

          echo ""
          echo "-- Top 3D Spaces --"
          curl -s "https://huggingface.co/api/spaces?search=3d&sort=likes&direction=-1&limit=20" 2>/dev/null | python3 -c "
import sys,json
spaces=json.load(sys.stdin)
for s in spaces[:20]:
    print(f'  {s[\"id\"]} | {s.get(\"likes\",0)} likes')
" 2>/dev/null

          echo ""
          echo "-- Top Image-to-3D Spaces --"
          curl -s "https://huggingface.co/api/spaces?search=image+to+3d&sort=likes&direction=-1&limit=20" 2>/dev/null | python3 -c "
import sys,json
spaces=json.load(sys.stdin)
for s in spaces[:20]:
    print(f'  {s[\"id\"]} | {s.get(\"likes\",0)} likes')
" 2>/dev/null

  # ============ AI PROXY SERVICES - COMPREHENSIVE ============
  ai-proxies-all:
    runs-on: ubuntu-latest
    steps:
      - name: ALL AI Proxy Services
        run: |
          echo "========================================"
          echo "AI PROXY SERVICES - ALL"
          echo "========================================"

          services=(
            "https://api.groq.com/openai/v1/models|Groq"
            "https://api.together.xyz/v1/models|Together AI"
            "https://api.cerebras.ai/v1/models|Cerebras"
            "https://api.deepinfra.com/v1/models|DeepInfra"
            "https://openrouter.ai/api/v1/models|OpenRouter"
            "https://llm.lepton.ai/api/v1/models|Lepton AI"
            "https://api.replicate.com/v1/models|Replicate"
            "https://api.endpoints.anyscale.com/v1/models|Anyscale"
            "https://api.perplexity.ai/models|Perplexity"
            "https://api.mistral.ai/v1/models|Mistral AI"
            "https://api.cohere.ai/v1/models|Cohere"
            "https://api.cloudflare.com/client/v4/ai/models|Cloudflare AI"
            "https://api.tripo3d.ai/|Tripo3D"
            "https://api.lumalabs.ai/|Luma Labs"
            "https://api.stability.ai/v1/engines|Stability AI"
          )

          for svc in "${services[@]}"; do
            url="${svc%|*}"
            name="${svc#*|}"
            echo ""
            echo "-- $name --"
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "FAIL")
            echo "  $url => $code"
          done

  # ============ 3D CLOUD SERVICES - ALL ENDPOINTS ============
  cloud-3d-all:
    runs-on: ubuntu-latest
    steps:
      - name: 3D Cloud ALL Endpoints
        run: |
          echo "========================================"
          echo "3D CLOUD SERVICES - ALL ENDPOINTS"
          echo "========================================"

          echo ""
          echo "-- MESHY AI (9 ENDPOINTS) --"
          for ep in image-to-3d text-to-3d remesh rigging retexture text-to-image image-to-image balance print/multi-color; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -X POST \
              "https://api.meshy.ai/openapi/v1/$ep" \
              -H "Authorization: Bearer test" \
              -H "Content-Type: application/json" \
              -H "X-Api-Version: v2026.04.03.post7" \
              -d '{}' 2>/dev/null || echo "FAIL")
            echo "  POST /openapi/v1/$ep => $code"
          done

          echo ""
          echo "MESHY v2:"
          for ep in text-to-3d image-to-3d; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -X POST \
              "https://api.meshy.ai/openapi/v2/$ep" \
              -H "Authorization: Bearer test" \
              -H "Content-Type: application/json" \
              -H "X-Api-Version: v2026.04.03.post7" \
              -d '{}' 2>/dev/null || echo "FAIL")
            echo "  POST /openapi/v2/$ep => $code"
          done

          echo ""
          echo "-- TRIPO3D --"
          for ep in "/" "/v2/models" "/v1/models" "/openapi.json" "/docs"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$ep" 2>/dev/null || echo "FAIL")
            echo "  GET $ep => $code"
          done

          echo ""
          echo "-- LUMA LABS --"
          for ep in "/" "/api" "/v1" "/docs"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://api.lumalabs.ai$ep" 2>/dev/null || echo "FAIL")
            echo "  GET $ep => $code"
          done

          echo ""
          echo "-- STABILITY AI --"
          for ep in "/v1/engines" "/v1/account" "/v1/organization" "/v1/balance" "/v1/user/balance"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://api.stability.ai$ep" 2>/dev/null || echo "FAIL")
            echo "  GET $ep => $code"
          done

          echo ""
          echo "-- REPLICATE 3D MODELS --"
          curl -s "https://api.replicate.com/v1/models?query=3d" 2>/dev/null | python3 -c "
import sys,json
try:
    data=json.load(sys.stdin)
    for m in data.get('results',[])[:10]:
        print(f'  {m[\"owner\"]}/{m[\"name\"]}')
except:
    print('  ERROR parsing')
" 2>/dev/null || echo "  FAIL"

  summary:
