name: Meshy Browser OAuth Teston: workflow_dispatchjobs:
  browser-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

    - name: Install Puppeteer Core
       run: |
          npm install puppeteer-core
          echo "=== Chromium check ==="
          which chromium || which chromium-browser || which google-chrome
          ls -la /usr/bin/chrom* 2>/dev/null || echo "none in /usr/bin"
          ls -la /usr/bin/google* 2>/dev/null || echo "none google"
          chromium --version 2>/dev/null || echo "no version"

    - name: Test Puppeteer
        run: |
          node -e "
            const puppeteer = require('puppeteer-core');
            puppeteer.launch({
              executablePath: '/usr/bin/chromium',
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
            }).then(b => { console.log('Browser OK'); b.close(); }).catch(e => console.error('ERR:', e.message))
          "

    - name: OAuth Flow Test
        run: |
          node << 'SCRIPT'
          const puppeteer = require('puppeteer-core');
          async function main() {
            const browser = await puppeteer.launch({
              executablePath: '/usr/bin/chromium',
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandboz', '--disable-dev-shm-usage']
            });
            const page = await browser.newPage();

            await page.goto('https://auth.meshy.ai/auth/v1/authorize?provider=google&redirect_to=https://www.meshy.ai', {
              waitUntil: 'networkidle2', timeout: 30000
            });
            console.log('URL', page.url());
            console.log('Title:', await page.title());

            // Look for Google sign-in
            const html = await page.content();
            console.log('Has google button:', html.includes('google') || html.includes('Google'));
            console.log('Has email input:', html.includes('email'));
            console.log('Has signin:', html.includes('signin') || html.includes('Sign in'));

            await browser.close();
            console.log('DONE');
          }
          main().catch(e => { console.error('Error:', e.message); process.exit(1); });
          SCRIPT
        timeout: 60s

    - name: Test Selenium
        run: |
          pip3\install selenium 2>&1 | tail -3
          python3 << 'PY'
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service

          opts = Options()
          opts.binary_location = '/usr/bin/chromium'
          opts.add_argument('--headless=new')
          opts.add_argument('--no-sandbox')
          opts.add_argument('--disable-dev-shm-usage')

          try:
            svc = Service('/usr/bin/chromium')
            driver = webdriver.Chrome(service=svc, options=opts)
            driver.get('https://auth.meshy.ai/auth/v1/authorize?provider=google&redirect_to=https://www.meshy.ai')
            print('Selenium OK, URL:', driver.current_url)
            print('Title:', driver.title)
            driver.quit()
          except Exception as e:
            print('Selenium error:', type(e).__name__, str(e)[:200])
          PY
        timeout: 60s