name: Outlier V4 Stealth

on: workflow_dispatch

jobs:
  outlier-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y > /dev/null 2>&1
          npm install playwright > /dev/null 2>&1
          npx playwright install chromium --with-deps > /dev/null 2>&1
          echo "=== RUNNER IP ==="
          curl -s https://ipinfo.io/json
        timeout-minutes: 15

      - name: Run Outlier V2
        run: node gha_outlier_stealth.cjs
        timeout-minutes: 25

      - name: Show Results
        run: |
          echo '=== RESULTS ==='
          echo 'Runner IP:'
          curl -s https://ipinfo.io/json
          echo ''
          echo 'Google Account:'
          cat google_account.txt 2>/dev/null || echo 'NOT CREATED'
          echo 'Google Created:'
          cat google_created.txt 2>/dev/null || echo 'NO'
          echo 'Phone Needed:'
          cat phone_needed.txt 2>/dev/null || echo 'NO'
          echo 'Step Errors:'
          cat step1_err.txt step2_err.txt step3_err.txt 2>/dev/null || echo 'NONE'
          echo 'Step Fails:'
          cat step1_fail.txt step2_fail.txt 2>/dev/null || echo 'NONE'
          echo 'Outlier SUCCESS:'
          cat outlier_success.txt 2>/dev/null || echo 'NO'
          echo 'Outlier BLOCKED:'
          cat outlier_blocked.txt 2>/dev/null || echo 'NO'
          echo 'Outlier CHECK:'
          cat outlier_check.txt 2>/dev/null || echo 'NO'
          echo 'Browser Error:'
          cat browser_error.txt 2>/dev/null || echo 'NO'
          echo 'Final Error:'
          cat ERROR.txt 2>/dev/null || echo 'NO'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: outlier-v3-results
          path: |
            google_account.txt
            google_created.txt
            google_state.txt
            phone_needed.txt
            outlier_success.txt
            outlier_blocked.txt
            outlier_check.txt
            outlier_landing_blocked.txt
            browser_error.txt
            ERROR.txt
            step1_err.txt
            step2_err.txt
            step3_err.txt
            step1_fail.txt
            step2_fail.txt
            outlier_test_err.txt
            no_google_btn.txt
            outlier_cookies.json
            shot_*.png
          retention-days: 7
