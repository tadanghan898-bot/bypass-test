          curl -s "https://api.meshy.ai/openapi/v1/balance" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZnJlY2xzeGZncW52Z2ZweGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU1ODQwNjUsImV4cCI6MjAzMTE2MDA2NX0.015muXUW_O30jeBOxEU9-TQOJigcKMUhkNFbPOWu_iA" \
            -H "X-Api-Version: v2026.04.03.post7"

  summary:
    needs: [meshy_oauth_full, github_token_hunter, supabase_internal, apikey_creation, all_3d_bypass]
    if: always()
