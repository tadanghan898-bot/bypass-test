name: Meshy Gen v2
on:
  push:
    branches: [register]

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Generate token + test
        run: |
          set -e
          echo "=== MESHY TOKEN + GENERATION ==="
          
          # Config
          SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZnJlY2xzeGZncW52Z2ZweGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU1ODQwNjUsImV4cCI6MjAzMTE2MDA2NX0.015muXUW_O30jeBOxEU9-TQOJigcKMUhkNFbPOWu_iA"
          
          # Get mail.tm domain
          DOMAIN=$(curl -s "https://api.mail.tm/domains" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['hydra:member'][0]['domain'])")
          echo "Domain: $DOMAIN"
          
          # Create mail.tm account
          EMAIL="mesh$(date +%s)@$DOMAIN"
          PASS="MeshyPass123!"
          echo "Email: $EMAIL"
          
          curl -s -X POST "https://api.mail.tm/accounts" \
            -H "Content-Type: application/json" \
            -d "{\"address\":\"$EMAIL\",\"password\":\"$PASS\"}" > /dev/null
          
          # Get mail.tm token
          MT_RESP=$(curl -s -X POST "https://api.mail.tm/token" \
            -H "Content-Type: application/json" \
            -d "{\"address\":\"$EMAIL\",\"password\":\"$PASS\"}")
          echo "MT resp: $MT_RESP"
          MT_TOKEN=$(echo "$MT_RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('token',''))" 2>/dev/null)
          echo "MT token: ${#MT_TOKEN} chars"
          
          if [ -z "$MT_TOKEN" ]; then
            echo "FAIL: no mail.tm token"
            exit 1
          fi
          
          # Code challenge
          CODE_CHALLENGE=$(python3 -c "
import hashlib, base64, os
d = os.urandom(32)
h = hashlib.sha256(d).digest()
print(base64.urlsafe_b64encode(h).rstrip(b'=').decode())
")
          
          # Send OTP
          echo "Sending OTP..."
          OTP_RESP=$(curl -s -X POST "https://auth.meshy.ai/auth/v1/otp" \
            -H "apikey: $SUPABASE_KEY" \
            -H "authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "origin: https://www.meshy.ai" \
            -H "referer: https://www.meshy.ai/" \
            -d "{\"email\":\"$EMAIL\",\"create_user\":true,\"code_challenge\":\"$CODE_CHALLENGE\",\"code_challenge_method\":\"s256\"}")
          echo "OTP resp: $OTP_RESP"
          
          # Poll OTP
          for i in $(seq 1 12); do
            sleep 5
            MSGS=$(curl -s "https://api.mail.tm/messages" -H "Authorization: Bearer $MT_TOKEN")
            MSG_ID=$(echo "$MSGS" | python3 -c "import json,sys; d=json.load(sys.stdin); msgs=d.get('hydra-member',[]); print(msgs[0]['id'] if msgs else '')" 2>/dev/null)
            if [ -n "$MSG_ID" ]; then
              HTML=$(curl -s "https://api.mail.tm/messages/$MSG_ID" -H "Authorization: Bearer $MT_TOKEN")
              OTP=$(echo "$HTML" | grep -oE '[0-9]{4,8}' | head -1)
              if [ -n "$OTP" ]; then
                echo "OTP: $OTP"
                break
              fi
            fi
            echo "Wait $i/12"
          done
          
          if [ -z "$OTP" ]; then
            echo "FAIL: OTP not found"
            exit 1
          fi
          
          # Verify
          echo "Verifying..."
          VERIFY=$(curl -s -X POST "https://auth.meshy.ai/auth/v1/verify" \
            -H "apikey: $SUPABASE_KEY" \
            -H "authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "origin: https://www.meshy.ai" \
            -d "{\"type\":\"email\",\"email\":\"$EMAIL\",\"token\":\"$OTP\"}")
          echo "Verify: $VERIFY"
          
          ACCESS_TOKEN=$(echo "$VERIFY" | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null)
          
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "FAIL: no access token"
            exit 1
          fi
          
          echo "=== SUCCESS! ACCESS_TOKEN=${ACCESS_TOKEN:0:30}... ==="
          
          # Test generation
          echo "Testing generation..."
          TASK=$(curl -s -X POST "https://api.meshy.ai/web/v2/tasks" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -H "origin: https://www.meshy.ai" \
            -d '{"phase":"draft","args":{"draft":{"prompt":"a robot arm","seed":42,"license":"cc-by-4.0","aiModel":"meshy-5","symmetryMode":0}},"isNSFW":false}')
          echo "Task: $TASK"
          
          TASK_ID=$(echo "$TASK" | python3 -c "import json,sys; print(json.load(sys.stdin).get('result',''))" 2>/dev/null)
          echo "TASK_ID=$TASK_ID"
          
          if [ -n "$TASK_ID" ]; then
            echo "Waiting for completion..."
            for i in $(seq 1 30); do
              sleep 5
              STATUS=$(curl -s "https://api.meshy.ai/web/v1/tasks/$TASK_ID/status" \
                -H "Authorization: Bearer $ACCESS_TOKEN")
              STAT=$(echo "$STATUS" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('result',{}).get('status','?'))" 2>/dev/null)
              echo "Status[$i]: $STAT"
              if [ "$STAT" = "SUCCEEDED" ] || [ "$STAT" = "FAILED" ]; then
                echo "$STATUS" | python3 -c "
import json,sys
d=json.load(sys.stdin)
r=d.get('result',{})
print('Model URL:', r.get('modelUrl','N/A'))
print('Preview URL:', r.get('previewUrl','N/A'))
print('Video URL:', r.get('videoUrl','N/A'))
"
                break
              fi
            done
          fi
